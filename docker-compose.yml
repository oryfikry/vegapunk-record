services:
  stella:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      chroma:
        condition: service_healthy
    environment:
      HOST: 127.0.0.1
      PORT: 3003
      SQLITE_PATH: /app/data/punk-records.sqlite
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      LLM_PROVIDER: mock
    volumes:
      - stella-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const response = await fetch('http://127.0.0.1:3003/health'); if (!response.ok) process.exit(1);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  stella-data:
  chroma-data:
